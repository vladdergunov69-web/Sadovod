# =============================================================================
#  Интернет-магазин «Садовод» — оркестрация Docker Compose
#
#  Сервисы:
#    db       — Microsoft SQL Server 2022 (данные в именованном томе mssql-data);
#    db-init  — одноразовый инициализатор: ждёт готовности db, создаёт базу
#               SadovodShop и выполняет Scripts/InitDatabase.sql (схема, триггеры,
#               процедуры, начальные данные). После выполнения завершается;
#    web      — само приложение «Садовод», стартует только после успешной
#               инициализации базы.
#
#  Запуск всего стенда:  docker compose up -d --build
#  Полная очистка:       docker compose down -v
# =============================================================================

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sadovod-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      # sqlcmd берётся из mssql-tools18 (есть в образе 2022); fallback на v17.
      # $$VAR — экранирование, чтобы переменную развернул shell контейнера, а не Compose.
      test:
        - CMD-SHELL
        - >
          /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -b -o /dev/null 2>/dev/null
          || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -b -o /dev/null 2>/dev/null
          || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sadovod-db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    volumes:
      - ./Scripts:/scripts:ro
    # Создаём БД (если её нет) и накатываем идемпотентный InitDatabase.sql.
    # -f 65001 — входной файл в кодировке UTF-8 (кириллица в seed-данных).
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then SQLCMD="/opt/mssql-tools18/bin/sqlcmd -C"; else SQLCMD="/opt/mssql-tools/bin/sqlcmd"; fi
        echo "Ожидание SQL Server и инициализация базы SadovodShop..."
        $$SQLCMD -S db -U sa -P "$$MSSQL_SA_PASSWORD" -Q "IF DB_ID('SadovodShop') IS NULL CREATE DATABASE SadovodShop;"
        $$SQLCMD -S db -U sa -P "$$MSSQL_SA_PASSWORD" -d SadovodShop -f 65001 -i /scripts/InitDatabase.sql
        echo "InitDatabase.sql выполнен успешно."
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sadovod-web
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "${ConnectionStrings__DefaultConnection}"
      PushSettings__Subject: "${PushSettings__Subject}"
      PushSettings__PublicKey: "${PushSettings__PublicKey}"
      PushSettings__PrivateKey: "${PushSettings__PrivateKey}"
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - product-images:/app/wwwroot/images/products
    restart: unless-stopped

volumes:
  mssql-data:
  product-images:
